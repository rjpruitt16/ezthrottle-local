app = "ezthrottle-local"
primary_region = "iad"

[build]

[env]
  PHX_HOST = "ezthrottle-local.fly.dev"
  PORT = "4000"
  PHX_SERVER = "true"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 1000
    soft_limit = 800

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
